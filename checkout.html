<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    window.dataLayer = window.dataLayer || [];
  </script>

  <style>
    .checkout-container {
      max-width: 700px;
      margin: 40px auto;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      background: #fff;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
      margin-top: 20px;
    }

    .place-order-btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      display: none;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo">ModernWeb</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Our Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="checkout-container">

  <h2>Shipping Address</h2>

  <div class="form-group"><input type="text" id="fullName" placeholder="Full Name"></div>
  <div class="form-group"><input type="text" id="mobile" placeholder="Mobile Number"></div>
  <div class="form-group"><textarea id="address" placeholder="Full Address"></textarea></div>
  <div class="form-group"><input type="text" id="city" placeholder="City"></div>
  <div class="form-group"><input type="text" id="pincode" placeholder="Pincode"></div>

  <h2>Order Summary</h2>
  <div id="orderSummary"></div>
  <div class="total" id="orderTotal"></div>

  <button id="placeOrderBtn" class="place-order-btn">
    Place Order
  </button>

  <div id="successMessage" class="message success">
    Order placed successfully!
  </div>

  <div id="errorMessage" class="message error">
    Order failed. Please fill all shipping details.
  </div>

</div>

<script>
// Metadata to populate the specific fields from your previous requirements
const productMetadata = {
  1:{brand:"Dell", color:"Silver", old:95000, price:80000},
  2:{brand:"Samsung", color:"Black", old:52000, price:45000},
  3:{brand:"Sony", color:"Blue", old:5000, price:3500},
  4:{brand:"Boat", color:"Black", old:12000, price:9000},
  5:{brand:"Logitech", color:"Red", old:2500, price:1500},
  6:{brand:"HP", color:"White", old:3500, price:2200},
  7:{brand:"Lenovo", color:"Grey", old:38000, price:30000},
  8:{brand:"LG", color:"Black", old:15000, price:12000},
  9:{brand:"JBL", color:"Brown", old:7500, price:5000},
  10:{brand:"Canon", color:"Black", old:65000, price:55000},
  11:{brand:"Mi", color:"White", old:2000, price:1200},
  12:{brand:"Seagate", color:"Black", old:6500, price:4800}
};

function getEcommerceItem(item, index) {
  const meta = productMetadata[item.id] || {};
  const discountVal = (meta.old - meta.price) > 0 ? (meta.old - meta.price) : 0;
  
  return {
    affiliation: "ModernWeb Store",
    discount: discountVal,
    google_business_vertical: "retail",
    index: index,
    item_brand: meta.brand || "",
    item_category: "Electronics",
    item_category2: "Hardware",
    item_category3: null,
    item_category4: null,
    item_category5: null,
    item_id: "SKU_" + item.id,
    item_list_id: "checkout_view",
    item_list_name: "Checkout Page",
    item_name: item.name,
    item_variant: meta.color || "",
    location_id: null,
    price: item.price,
    quantity: 1
  };
}

const cart = JSON.parse(localStorage.getItem("cart")) || [];
const summaryDiv = document.getElementById("orderSummary");
const totalDiv = document.getElementById("orderTotal");

let total = 0;
let itemsArray = [];

cart.forEach((item, index) => {
  total += item.price;
  itemsArray.push(getEcommerceItem(item, index));

  summaryDiv.innerHTML += `
    <div class="summary-item">
      <span>${item.name}</span>
      <span>₹${item.price.toLocaleString()}</span>
    </div>
  `;
});

totalDiv.innerHTML = "Total: ₹" + total.toLocaleString();

/* GA4 begin_checkout */
window.dataLayer.push({ ecommerce: null }); 
window.dataLayer.push({
  event: "begin_checkout",
  ecommerce: {
    currency: "INR",
    value: total,
    items: itemsArray
  }
});

document.getElementById("placeOrderBtn").addEventListener("click", function(){

  const fullName = document.getElementById("fullName").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const address = document.getElementById("address").value.trim();
  const city = document.getElementById("city").value.trim();
  const pincode = document.getElementById("pincode").value.trim();

  const successMsg = document.getElementById("successMessage");
  const errorMsg = document.getElementById("errorMessage");

  successMsg.style.display = "none";
  errorMsg.style.display = "none";

  if (!fullName || !mobile || !address || !city || !pincode) {
    errorMsg.style.display = "block";
    window.dataLayer.push({
      event: "checkout_error",
      error_type: "missing_shipping_details"
    });
    return;
  }

  successMsg.style.display = "block";
  const transactionId = "T" + new Date().getTime();

  /* GA4 purchase */
  window.dataLayer.push({ ecommerce: null }); 
  window.dataLayer.push({
    event: "purchase",
    ecommerce: {
      transaction_id: transactionId,
      currency: "INR",
      value: total,
      items: itemsArray
    }
  });

  localStorage.removeItem("cart");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 2000);

});

</script>

</body>
</html>
