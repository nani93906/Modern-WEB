<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Products</title>
  <link rel="stylesheet" href="styles.css">

  <script>
    window.dataLayer = window.dataLayer || [];

    const existingUser = JSON.parse(localStorage.getItem("user"));

    window.dataLayer.push({ 
      page_URL: window.location.href,
      page_Name: "Our Products",
      user_type: existingUser ? existingUser.userType : "guest"
    });
  </script>

  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-T8C6RVQM');
  </script>

  <style>
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .product-card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      background: #fff;
    }
    .price { font-size: 18px; font-weight: bold; }
    .old-price { text-decoration: line-through; color: grey; font-size: 14px; }
    .discount { color: green; font-size: 14px; }
    .btn {
      display: inline-block;
      padding: 8px 15px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T8C6RVQM"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

<header>
  <div class="container">
    <div class="logo">ModernWeb</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Our Products</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="container">
  <h1>Our Products</h1>
  <div class="product-grid">

<script>
const productList = [
  {id:1,name:"Laptop",price:80000,old:95000,color:"Silver",brand:"Dell"},
  {id:2,name:"Smartphone",price:45000,old:52000,color:"Black",brand:"Samsung"},
  {id:3,name:"Headphones",price:3500,old:5000,color:"Blue",brand:"Sony"},
  {id:4,name:"Smart Watch",price:9000,old:12000,color:"Black",brand:"Boat"},
  {id:5,name:"Gaming Mouse",price:1500,old:2500,color:"Red",brand:"Logitech"},
  {id:6,name:"Keyboard",price:2200,old:3500,color:"White",brand:"HP"},
  {id:7,name:"Tablet",price:30000,old:38000,color:"Grey",brand:"Lenovo"},
  {id:8,name:"Monitor",price:12000,old:15000,color:"Black",brand:"LG"},
  {id:9,name:"Speaker",price:5000,old:7500,color:"Brown",brand:"JBL"},
  {id:10,name:"Camera",price:55000,old:65000,color:"Black",brand:"Canon"},
  {id:11,name:"Power Bank",price:1200,old:2000,color:"White",brand:"Mi"},
  {id:12,name:"External HDD",price:4800,old:6500,color:"Black",brand:"Seagate"}
];

/* ===========================
   GA4 view_item_list EVENT
=========================== */
window.dataLayer.push({ ecommerce: null });
window.dataLayer.push({
  event: "view_item_list",
  ecommerce: {
    item_list_id: "plp_products",
    item_list_name: "ShopEase:Products",
    items: productList.map((p, index) => ({
      affiliation: "ShopEase",
      discount: (p.old - p.price) > 0 ? (p.old - p.price) : 0,
      google_business_vertical: "retail",
      index: index,
      item_brand: p.brand || "ShopEase",
      item_category: "electronics",
      item_category2: null,
      item_category3: null,
      item_category4: null,
      item_category5: null,
      item_id: "SKU_" + p.id,
      item_list_id: "plp_products",
      item_list_name: "ShopEase:Products",
      item_name: p.name,
      item_variant: p.color,
      location_id: null,
      price: p.price,
      quantity: 1
    }))
  }
});

/* ===========================
   RENDER PRODUCTS
=========================== */
document.write(productList.map((p, index) => {
  const discountVal = (p.old - p.price) > 0 ? (p.old - p.price) : 0;
  return `
  <div class="product-card">
    <h3>${p.name}</h3>
    <p>Color: ${p.color}</p>
    <div class="price">₹${p.price.toLocaleString()}</div>
    <div class="old-price">₹${p.old.toLocaleString()}</div>
    <div class="discount">${Math.round((1 - p.price/p.old)*100)}% OFF</div>

    <a href="productPDP.html?id=${p.id}" 
       class="btn product-link"
       data-id="${p.id}"
       data-name="${p.name}"
       data-price="${p.price}"
       data-brand="${p.brand}"
       data-color="${p.color}"
       data-discount="${discountVal}"
       data-index="${index}">
       View Details
    </a>
  </div>
`;}).join(""));

</script>
  </div>
</section>

<script>
/* ===========================
   GA4 select_item EVENT
=========================== */
document.addEventListener("click", function(e){
  if(e.target.classList.contains("product-link")){
    window.dataLayer.push({ ecommerce: null });
    window.dataLayer.push({
      event: "select_item",
      ecommerce: {
        item_list_id: "plp_products",
        item_list_name: "ShopEase:Products",
        items: [{
          affiliation: "ShopEase",
          discount: Number(e.target.dataset.discount),
          google_business_vertical: "retail",
          index: Number(e.target.dataset.index),
          item_brand: e.target.dataset.brand,
          item_category: "electronics",
          item_category2: null,
          item_category3: null,
          item_category4: null,
          item_category5: null,
          item_id: "SKU_" + e.target.dataset.id,
          item_list_id: "plp_products",
          item_list_name: "ShopEase:Products",
          item_name: e.target.dataset.name,
          item_variant: e.target.dataset.color,
          location_id: null,
          price: Number(e.target.dataset.price),
          quantity: 1
        }]
      }
    });
  }
});
</script>

</body>
</html>
